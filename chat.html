<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 가이드 봇</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="page-shell">
    <nav class="site-nav">
      <a href="index.html" class="site-logo">미니 게임</a>
      <div class="site-nav-actions">
        <a href="profile.html" class="nav-chat-link">🏆 내 프로필</a>
        <a href="index.html" class="back-link">← 게임 목록</a>
      </div>
    </nav>

    <main class="app app-chat">
      <header class="header">
        <h1>💬 게임 가이드 봇</h1>
        <p class="subtitle">각 게임의 규칙과 플레이 방법을 물어보세요. Gemini 2.5 Flash가 안내해 드립니다.</p>
      </header>

      <div class="chat-notice hidden" id="chat-notice"></div>

      <section class="chat-panel panel">
        <div class="chat-messages" id="chat-messages" aria-live="polite"></div>

        <div class="chat-suggestions" id="chat-suggestions">
          <button type="button" class="chat-chip" data-prompt="사다리 타기는 어떻게 하나요?">🪜 사다리 타기</button>
          <button type="button" class="chat-chip" data-prompt="반응속도 테스트 규칙 알려줘">⚡ 반응속도</button>
          <button type="button" class="chat-chip" data-prompt="가위바위보 어떻게 플레이해?">✊ 가위바위보</button>
          <button type="button" class="chat-chip" data-prompt="틱택토 승리 방법은?">⭕ 틱택토</button>
          <button type="button" class="chat-chip" data-prompt="기억력 카드 게임 규칙 설명해줘">🃏 기억력 카드</button>
          <button type="button" class="chat-chip" data-prompt="숫자 맞추기 어떻게 하나요?">🔢 숫자 맞추기</button>
          <button type="button" class="chat-chip" data-prompt="새총 슈팅 게임 방법 알려줘">🐦 새총 슈팅</button>
        </div>

        <form class="chat-form" id="chat-form">
          <input
            type="text"
            id="chat-input"
            class="chat-input"
            placeholder="예: 사다리 타기에서 참가자는 몇 명까지 가능해?"
            autocomplete="off"
            maxlength="500"
            required
          >
          <button type="submit" class="btn btn-primary" id="chat-send">보내기</button>
        </form>
      </section>
    </main>
  </div>

  <script src="chat.js"></script>
</body>
</html>
