<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>반응속도 테스트</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <nav class="site-nav">
      <a href="index.html" class="site-logo">미니 게임</a>
      <div class="site-nav-actions">
        <a href="chat.html" class="nav-chat-link">💬 게임 가이드</a>
        <a href="index.html" class="back-link">← 게임 목록</a>
      </div>
    </nav>

    <main class="app app-reaction">
      <header class="header">
        <h1>⚡ 반응속도 테스트</h1>
        <p class="subtitle">화면이 초록색으로 바뀌면 바로 클릭하세요. 빨간색일 때는 참아야 합니다!</p>
      </header>

      <div class="stats-bar">
        <div class="stat">
          <span class="stat-label">최고 기록</span>
          <span class="stat-value" id="best-time">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">평균 (최근 5회)</span>
          <span class="stat-value" id="avg-time">-</span>
        </div>
        <div class="stat">
          <span class="stat-label">시도 횟수</span>
          <span class="stat-value" id="attempt-count">0</span>
        </div>
      </div>

      <button type="button" class="reaction-pad state-idle" id="reaction-pad">
        <span class="reaction-title" id="reaction-title">클릭해서 시작</span>
        <span class="reaction-sub" id="reaction-sub">아무 곳이나 눌러 첫 시도를 시작하세요</span>
      </button>
    </main>
  </div>

  <script src="reaction.js"></script>
</body>
</html>
